<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate of Perfect Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="../Assets/CSS/root.css">
    <link rel="stylesheet" href="../Assets/CSS/Toast.css">
    <link rel="stylesheet" href="../CSS/admin-style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable@14.3.0/dist/handsontable.full.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        .page-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-image: url('../assets/images/No BG.png');
            background-repeat: no-repeat;
            background-position: center center;
            opacity: 0.1;
            pointer-events: none;
            background-size: 90% auto;
            animation: fadeInBG 2s ease-out;
        }

        @media (max-width: 991px) and (min-width: 768px) {
            .page-background {
                background-size: 100% auto;
            }
        }

        @media (max-width: 767px) and (min-width: 576px) {
            .page-background {
                background-size: 130% auto;
            }
        }

        @media (max-width: 575px) {
            .page-background {
                background-size: 200% auto;
            }
        }

        /* Extra small phones (below 375px) */
        @media (max-width: 375px) {
            .page-background {
                background-size: 250% auto;
            }
        }
    </style>
    <style>
        :root {
            --blue-deep: #1565C0;
            --blue-mid: #2196F3;
            --blue-light: #64B5F6;
            --cyan: #00E5FF;
            --cyan-soft: #B2EBF2;
            --red: #F44336;
            --red-dark: #B71C1C;
            --dark: #1a1a2e;
            --white: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.97);
            --shadow: 0 8px 32px rgba(21, 101, 192, 0.25);
        }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d47a1 0%, #1976D2 35%, #29B6F6 70%, #00E5FF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.8rem, 10vw, 4.5rem);
            color: #fff;
            text-align: center;
            letter-spacing: 6px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            margin-bottom: 28px;
        }

        /* Main stats card */
        .stats-card {
            background: linear-gradient(135deg, #1E88E5 0%, #42A5F5 50%, #80DEEA 100%);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 12px 40px rgba(0, 100, 200, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .stats-card::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .stat-box {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 28px 20px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            transition: transform 0.2s;
        }

        .stat-box:hover {
            transform: translateY(-2px);
        }

        .stat-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 12vw, 5rem);
            color: var(--white);
            line-height: 1;
            letter-spacing: 2px;
            display: block;
            text-align: center;
        }

        .stat-label {
            display: block;
            margin-top: 12px;
            font-size: 1.35rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        /* Info rows */
        .info-section {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 0.88rem;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: rgba(255, 255, 255, 0.75);
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .info-value {
            color: #fff;
            font-weight: 800;
            text-align: right;
            max-width: 65%;
            font-size: 0.82rem;
        }

        /* Stats row */
        .mini-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .mini-stat {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
        }

        .mini-stat-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: #fff;
            letter-spacing: 1px;
        }

        .mini-stat-lbl {
            font-size: 0.68rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* Buttons */
        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-export {
            background: linear-gradient(135deg, #00B8D4, #26C6DA);
            color: #fff;
            box-shadow: 0 4px 16px rgba(0, 184, 212, 0.5);
        }

        .btn-export:hover {
            box-shadow: 0 6px 20px rgba(0, 184, 212, 0.7);
            transform: translateY(-1px);
        }

        .btn-import {
            background: linear-gradient(135deg, #37474F, #546E7A);
            color: #fff;
            box-shadow: 0 4px 16px rgba(55, 71, 79, 0.4);
        }

        .btn-import:hover {
            box-shadow: 0 6px 20px rgba(55, 71, 79, 0.6);
            transform: translateY(-1px);
        }

        .btn-delete {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #EF5350, #F44336, #D32F2F);
            color: #fff;
            font-size: 1.3rem;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(211, 47, 47, 0.5);
            letter-spacing: 3px;
        }

        .btn-delete:hover {
            box-shadow: 0 8px 28px rgba(211, 47, 47, 0.7);
            transform: translateY(-2px);
        }

        .btn-refresh {
            width: 100%;
            padding: 11px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(6px);
        }

        .btn-refresh:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* No data notice */
        .no-data {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            font-style: italic;
            padding: 8px 0;
        }

        /* Last updated */
        .last-updated {
            text-align: center;
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.72rem;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        /* Hidden file input */
        #fileInput {
            display: none;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a1a2e;
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: transform 0.35s ease;
            z-index: 999;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .page-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-image: url('../assets/images/No BG.png');
            background-repeat: no-repeat;
            background-position: center center;
            opacity: 0.1;
            pointer-events: none;
            background-size: 90% auto;
            animation: fadeInBG 2s ease-out;
        }

        @media (max-width: 991px) and (min-width: 768px) {
            .page-background {
                background-size: 100% auto;
            }
        }

        @media (max-width: 767px) and (min-width: 576px) {
            .page-background {
                background-size: 130% auto;
            }
        }

        @media (max-width: 575px) {
            .page-background {
                background-size: 200% auto;
            }
        }

        /* Extra small phones (below 375px) */
        @media (max-width: 375px) {
            .page-background {
                background-size: 250% auto;
            }
        }
    </style>
</head>

<body>
    <div class="page-background"></div>
    <nav class="navbar navbar-light bg-primary shadow-sm fixed-top" data-bs-theme="dark">
        <div class="container-fluid">
            <div
                class="d-flex flex-column flex-lg-row w-100 align-items-start align-items-lg-center justify-content-lg-between">
                <div class="d-flex align-items-center w-100 w-lg-auto justify-content-start mb-2 mb-lg-0">
                    <button class="btn btn-outline-secondary me-2 d-lg-none" id="toggleBtn">☰</button>
                    <span class="navbar-brand mb-0 h1 d-none d-lg-inline" id="Hi">CardGen: From Grade Consolidation to
                        Printable Report Card for Senior High School</span>
                    <span class="navbar-brand mb-0 h1 d-inline d-lg-none" id="Hi">CardGen 2025</span>
                </div>
            </div>
        </div>
    </nav>
    <div class="sidebar collapsed" id="sidebar">
        <ul class="nav flex-column px-3">
            <div id="sidebar-container"></div>
        </ul>
    </div>
    <div class="main-content">
        <div class="container-fluid container">
            <div class="row">
                <div class="col-12">
                    <button class="btn btn-primary align-items-start"
                        onclick="window.location.href='Other_Features.html'">Back</button>
                    <h1>Dashboard</h1>

                    <!-- Main Male/Female Stats -->
                    <div class="stats-card">
                        <div class="stats-grid">
                            <div>
                                <span class="stat-number" id="maleCount">0</span>
                                <span class="stat-label">Male</span>
                            </div>
                            <div>
                                <span class="stat-number" id="femaleCount">0</span>
                                <span class="stat-label">Female</span>
                            </div>
                        </div>
                    </div>

                    <!-- Mini stats: Total, with grades, without grades -->
                    <div class="mini-stats">
                        <div class="mini-stat">
                            <div class="mini-stat-num" id="totalCount">0</div>
                            <div class="mini-stat-lbl">Total</div>
                        </div>
                        <div class="mini-stat">
                            <div class="mini-stat-num" id="withGrades">0</div>
                            <div class="mini-stat-lbl">With Grades</div>
                        </div>
                        <div class="mini-stat">
                            <div class="mini-stat-num" id="noGrades">0</div>
                            <div class="mini-stat-lbl">No Grades</div>
                        </div>
                    </div>

                    <!-- Class Info -->
                    <div class="info-section" id="infoSection">
                        <div class="no-data" id="noDataMsg">No CardGen data found in local storage.</div>
                    </div>

                    <!-- Buttons -->
                    <button class="btn btn-refresh" onclick="loadData()">↻ Refresh Data</button>

                    <div class="btn-row">
                        <button class="btn btn-export" onclick="exportData()">Export Data</button>
                        <button class="btn btn-import" onclick="document.getElementById('fileInput').click()">Import
                            Data</button>
                    </div>
                    <input type="file" id="fileInput" accept=".json" onchange="importData(event)">

                    <button class="btn btn-delete" onclick="deleteData()">DELETE DATA</button>

                    <div class="last-updated" id="lastUpdated"></div>

                    <div class="toast" id="toast"></div>
                </div>
            </div>
        </div>
    </div>
    </div>

    <script src="../Assets/JS/loader.js"></script>
    <script>
        loadSidebar();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <script>
        function showToast(msg, duration = 2500) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), duration);
        }

        function loadData() {
            try {
                const raw = localStorage.getItem('CardGen');
                if (!raw) {
                    setEmpty();
                    return;
                }
                const data = JSON.parse(raw);
                renderDashboard(data);
                document.getElementById('lastUpdated').textContent = 'Last refreshed: ' + new Date().toLocaleTimeString();
            } catch (e) {
                setEmpty();
                showToast('Error reading CardGen data.');
            }
        }

        function setEmpty() {
            document.getElementById('maleCount').textContent = '0';
            document.getElementById('femaleCount').textContent = '0';
            document.getElementById('totalCount').textContent = '0';
            document.getElementById('withGrades').textContent = '0';
            document.getElementById('noGrades').textContent = '0';
            document.getElementById('infoSection').innerHTML = '<div class="no-data">No CardGen data found in local storage.</div>';
            document.getElementById('lastUpdated').textContent = '';
        }

        function studentHasGrades(student) {
            const g = student.grade;
            if (!g) return false;
            for (const sem of ['sem1', 'sem2']) {
                if (!g[sem]) continue;
                for (const type of ['core', 'applied']) {
                    if (!g[sem][type]) continue;
                    for (const sub of Object.values(g[sem][type])) {
                        if (sub && sub.final !== '' && sub.final !== null && sub.final !== undefined) return true;
                    }
                }
            }
            return false;
        }

        function renderDashboard(data) {
            const info = data.information || {};
            const students = data.students || {};
            const boys = students.boys || {};
            const girls = students.girls || {};

            const maleList = Object.values(boys);
            const femaleList = Object.values(girls);
            const allStudents = [...maleList, ...femaleList];

            const maleCount = maleList.length;
            const femaleCount = femaleList.length;
            const total = allStudents.length;
            const withGrades = allStudents.filter(studentHasGrades).length;
            const noGrades = total - withGrades;

            // Animate numbers
            animateNum('maleCount', maleCount);
            animateNum('femaleCount', femaleCount);
            animateNum('totalCount', total);
            animateNum('withGrades', withGrades);
            animateNum('noGrades', noGrades);

            // Info section
            const infoSection = document.getElementById('infoSection');
            if (Object.keys(info).length === 0) {
                infoSection.innerHTML = '<div class="no-data">No class information found.</div>';
            } else {
                const rows = [
                    ['Grade', info.grade],
                    ['Section', info.section],
                    ['School Year', info['school-year']],
                    ['Track', info.track],
                    ['Strand', info.strand],
                    ['Adviser', info.adviser],
                    ['Principal', info.principal],
                ];
                infoSection.innerHTML = rows.filter(([, v]) => v).map(([label, value]) => `
        <div class="info-row">
          <span class="info-label">${label}</span>
          <span class="info-value">${value}</span>
        </div>
      `).join('');
            }
        }

        function animateNum(id, target) {
            const el = document.getElementById(id);
            const start = parseInt(el.textContent) || 0;
            const duration = 600;
            const startTime = performance.now();
            function update(now) {
                const progress = Math.min((now - startTime) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                el.textContent = Math.round(start + (target - start) * ease);
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        function exportData() {
            const raw = localStorage.getItem('CardGen');
            if (!raw) { showToast('No data to export.'); return; }
            const blob = new Blob([raw], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'CardGen_' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Data exported successfully!');
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const parsed = JSON.parse(e.target.result);
                    localStorage.setItem('CardGen', JSON.stringify(parsed));
                    loadData();
                    showToast('Data imported successfully!');
                } catch {
                    showToast('Invalid JSON file.');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function deleteData() {
            if (!confirm('Are you sure you want to DELETE all CardGen data? This cannot be undone.')) return;
            localStorage.removeItem('CardGen');
            setEmpty();
            showToast('All data deleted.');
        }

        // Auto-refresh on storage changes from other tabs
        window.addEventListener('storage', (e) => {
            if (e.key === 'CardGen') loadData();
        });

        // Initial load
        loadData();
    </script>

    <script src="../Assets/JS/SideBar-NavBar.js"></script>
    <script src="../Assets/JS/Logout.js"></script>
    <script src="../Assets/JS/Toast.js"></script>
</body>
